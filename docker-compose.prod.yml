# Cấu hình PRODUCTION cho 1 máy ảo (Alibaba Cloud ECS) + tên miền + HTTPS tự động (Caddy).
# Chạy:  docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Chỉ Caddy mở ra internet (80/443). postgres/redis/api/web chạy trong mạng nội bộ,
# KHÔNG publish cổng ra ngoài.

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    # AOF everysec: crash chỉ mất tối đa ~1s bộ đếm (mặc định RDB có thể mất vài phút)
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Sao lưu Postgres: pg_dump nén vào ./backups ngay khi khởi động rồi mỗi 24h,
  # tự xóa bản cũ hơn BACKUP_KEEP_DAYS ngày. Khôi phục:
  #   gunzip -c backups/<file>.sql.gz | docker compose -f docker-compose.prod.yml exec -T postgres psql -U $POSTGRES_USER $POSTGRES_DB
  # Lưu ý: ./backups nằm cùng ổ đĩa máy chủ — nên cron thêm việc đẩy file lên OSS/S3.
  backup:
    image: postgres:16-alpine
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - ./backups:/backups
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          if pg_dump -h postgres -U "$$POSTGRES_USER" "$$POSTGRES_DB" | gzip > "/backups/$$ts.sql.gz.tmp"; then
            mv "/backups/$$ts.sql.gz.tmp" "/backups/$$ts.sql.gz"
            echo "[backup] OK $$ts.sql.gz"
            find /backups -name '*.sql.gz' -mtime +"$$BACKUP_KEEP_DAYS" -delete
          else
            rm -f "/backups/$$ts.sql.gz.tmp"
            echo "[backup] FAILED $$ts — thử lại sau 1h"
            sleep 3600
            continue
          fi
          sleep 86400
        done

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900s}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      PUBLIC_LINK_DOMAIN: ${PUBLIC_LINK_DOMAIN}
      TRAFFIC_SYNC_INTERVAL_SEC: ${TRAFFIC_SYNC_INTERVAL_SEC:-60}
      LINK_CACHE_TTL_SEC: ${LINK_CACHE_TTL_SEC:-30}
      BUSINESS_UTC_OFFSET_MIN: ${BUSINESS_UTC_OFFSET_MIN:-480}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    # Publish CHỈ ra loopback host → nginx host proxy tới 127.0.0.1:3000 (không phụ
    # thuộc IP container, restart Docker không đổi cổng). KHÔNG mở ra internet.
    ports:
      - "127.0.0.1:3000:3000"
    # migrate + seed (idempotent) + start
    command: sh -c "npx prisma migrate deploy && node dist/prisma/seed.js && node dist/src/main.js"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    restart: always
    depends_on:
      - api
    # nginx host proxy /  → 127.0.0.1:8080 (loopback, không ra internet)
    ports:
      - "127.0.0.1:8080:80"

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
